
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0,
               user-scalable=no, shrink-to-fit=no, viewport-fit=cover">

<title>Unity WebGL Game</title>

<link rel="stylesheet" href="TemplateData/style.css">

</head>

<body>
<div id="unity-container">
    <canvas id="unity-canvas"></canvas>

    <div id="unity-loading-bar">
        <div id="unity-progress-bar-full"></div>
    </div>
</div>

<script src="Build/build.loader.js"></script>
<script>
  const canvas = document.querySelector("#unity-canvas");

  createUnityInstance(canvas, {
      dataUrl: "Build/build.data.unityweb",
      frameworkUrl: "Build/build.framework.js.unityweb",
      codeUrl: "Build/build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "YourCompany",
      productName: "YourGame",
      productVersion: "1.0",
  }, (progress) => {
      document.getElementById("unity-progress-bar-full").style.width = 100 * progress + "%";
  }).then(() => {
      document.getElementById("unity-loading-bar").style.display = "none";
  });

  // iPad 100vh fix
  function fixVH() {
      document.documentElement.style.height = window.innerHeight + "px";
      document.getElementById("unity-container").style.height = window.innerHeight + "px";
  }

  window.addEventListener("resize", fixVH);
  window.addEventListener("orientationchange", fixVH);
  fixVH();
</script>

</body>
</html>
